<!doctype html>
<html lang="en" class="scroll-smooth">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" type="image/png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#0b0b0c" />
		<link rel="preload" href="%sveltekit.assets%/fonts/chakra-petch-600.woff2" as="font" type="font/woff2" crossorigin />
		<link rel="preload" href="%sveltekit.assets%/fonts/poppins-400.woff2" as="font" type="font/woff2" crossorigin />
		<script>
			// Apply saved theme before first paint (default: dark)
			try {
				var t = localStorage.getItem('theme');
				if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
			} catch (e) {}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="bg-ink antialiased">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
